name: Update repository fallback

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

concurrency:
  group: hub-converter-fallback
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run collect
      - name: Commit fallback snapshot
        run: |
          git config user.name "hub-converter-rates[bot]"
          git config user.email "hub-converter-rates[bot]@users.noreply.github.com"
          git add public/latest
          git diff --cached --quiet && exit 0
          git commit -m "data: refresh fallback snapshot"
          git push
